<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F8F7FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>心理测评</title>
  <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body>
  <div id="app">
    <!-- Welcome Screen -->
    <div id="welcome-screen" class="screen active">
      <div class="greeting">Hi~ 你好👋</div>
      <div class="assessment-subtitle" id="assessment-subtitle"></div>
      <div class="assessment-info">
        <button id="start-btn" class="assessment-title-btn">加载中...</button>
        <p class="assessment-meta" id="assessment-meta"></p>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
        <span class="progress-text" id="progress-text">1/5</span>
      </div>
      <div class="question-card" id="question-card">
        <p class="question-text" id="question-text"></p>
      </div>
      <div class="options-container" id="options-container"></div>
      <div class="nav-buttons">
        <button id="prev-btn" class="btn btn-secondary">上一题</button>
        <button id="next-btn" class="btn btn-primary">下一题</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
      <div class="result-header">
        <div class="result-label">你的测评结果</div>
        <h1 class="result-title" id="result-title"></h1>
      </div>
      <div class="result-card" id="result-card">
        <p class="result-description" id="result-description"></p>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
